            overscroll-behavior: none; 
        }
        #flipbook-container {
            transition: transform 0.3s ease;
            transform-origin: center center;
            will-change: transform; 
        }
        #flipbook {
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #flipbook .page {
            background-color: white;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
        }
        #controls button {
            font-size: 18px;
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: white;
            font-weight: bold;
        }
        #controls button:active {
            background: #ccc;
        }
    </style>
</head>

        <button onclick="zoomOut()">➖ 축소</button>
        <button onclick="zoomIn()">➕ 확대</button>

    <script>
        let currentZoom = 1;

        function autoFitScreen() {
            let screenW = window.innerWidth * 0.95; 
            let screenH = window.innerHeight * 0.85; 
            let bookW = 1130;
            let bookH = 800;
            
            let scale = Math.min(screenW / bookW, screenH / bookH);
            if(scale > 1) scale = 1; 
            
            currentZoom = scale;
            applyZoom();
        }

        function applyZoom() {
            document.getElementById('flipbook-container').style.transform = `scale(${currentZoom})`;
        }

        function zoomIn() { currentZoom += 0.2; applyZoom(); }
        function zoomOut() { if(currentZoom > 0.3) { currentZoom -= 0.2; applyZoom(); } }

        function loadImages(page) {
            for (let i = page - 3; i <= page + 3; i++) {
                let $p = $('#flipbook .p' + i);
                if ($p.length && $p.attr('data-bg')) {
                    $p.css('background-image', 'url(' + $p.attr('data-bg') + ')');
                    $p.removeAttr('data-bg');
                }
            }
        }

        $(window).ready(function() {
            $("#flipbook").turn({
                width: 1130,     
                height: 800,    
                autoCenter: true,         
                gradients: true,          
                duration: 800,           
                acceleration: true,      
                elevation: 50,           
                when: {
                    turning: function(event, page, view) {
                        loadImages(page);
                    }
                }
            });

            loadImages(1);
            
            autoFitScreen();
            $(window).resize(function() { autoFitScreen(); });

            $(window).bind('keydown', function(e) {
                if (e.keyCode == 37) $('#flipbook').turn('previous');
                else if (e.keyCode == 39) $('#flipbook').turn('next');
            });

            // ==========================================
            // 🌟 완전히 새롭게 짠 터치 스와이프 로직 🌟
            // ==========================================
            let touchStartX = 0;
            let touchStartY = 0;
            let isSwiping = false;

            document.addEventListener('touchstart', function(e) {
                // 두 손가락 이상 닿으면 스와이프를 취소하고 줌(확대) 모드로 양보
                if (e.touches.length > 1) {
                    isSwiping = false; 
                    return;
                }
                isSwiping = true;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, {passive: true});

            // 스크롤 중간에 손가락이 하나 더 닿아도 취소
            document.addEventListener('touchmove', function(e) {
                if (e.touches.length > 1) {
                    isSwiping = false;
                }
            }, {passive: true});

            document.addEventListener('touchend', function(e) {
                if (!isSwiping) return; 

                let touchEndX = e.changedTouches[0].clientX;
                let touchEndY = e.changedTouches[0].clientY;
                
                let deltaX = touchEndX - touchStartX;
                let deltaY = touchEndY - touchStartY;

                // 조건 1. 좌/우로 민 거리가 50px 이상일 것 (기존 100px에서 하향하여 둔감함 해결)
                // 조건 2. 위/아래로 민 거리가 100px 이하일 것 (위아래 스크롤을 책 넘김으로 오해하는 것 방지)
                if (Math.abs(deltaX) > 50 && Math.abs(deltaY) < 100) {
                    if (deltaX < 0) $('#flipbook').turn('next');      // 왼쪽으로 스와이프 -> 다음 페이지
                    if (deltaX > 0) $('#flipbook').turn('previous');  // 오른쪽으로 스와이프 -> 이전 페이지
                }
            }, {passive: true});
        });
    </script>
